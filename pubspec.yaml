name: fftcg_companion
description: A companion app for the Final Fantasy Trading Card Game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0
  flutter: ">=3.16.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_app_check: ^0.2.1+8
  firebase_auth: ^4.15.3
  firebase_crashlytics: ^3.4.8
  firebase_analytics: ^10.7.4
  
  # Firebase UI
  firebase_ui_auth: ^1.11.0
  firebase_ui_firestore: ^1.5.15
  firebase_ui_storage: ^1.0.3
  firebase_ui_oauth: ^1.4.16
  firebase_ui_oauth_google: ^1.2.16
  firebase_ui_localizations: ^1.9.0

  # Platform Interface Dependencies
  firebase_core_platform_interface: ^5.0.0
  plugin_platform_interface: ^2.1.8

  # State Management
  provider: ^6.1.1
  
  # Local Storage & Caching
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_cache_manager: ^3.3.1
  cached_network_image: ^3.3.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_colorpicker: ^1.0.3
  shimmer: ^3.0.0
  auto_size_text: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  infinite_scroll_pagination: ^4.0.0
  flutter_svg: ^2.0.9
  fl_chart: ^0.66.0
  flutter_native_splash: ^2.3.7
  
  # Camera & ML Kit
  camera: ^0.10.5+5
  google_mlkit_commons: ^0.6.1
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # Utilities
  xxh3: ^1.0.1
  logger: ^2.0.2+1
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0

  # Environment Variables
  envied: ^0.5.2

dev_dependencies:
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  test: ^1.24.9
  integration_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  envied_generator: ^0.5.2
  flutter_launcher_icons: ^0.13.1
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  color_dark: "#121212"
  image_dark: assets/images/splash_logo_dark.png
  android_12:
    image: assets/images/splash_logo_android12.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/splash_logo_android12_dark.png
    icon_background_color_dark: "#121212"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21
  remove_alpha_ios: true